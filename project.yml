name: PTPeep
options:
  bundleIdPrefix: com.fozzie
  deploymentTarget:
    macOS: "13.0"
  defaultConfig: Debug
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES

configs:
  Debug: debug
  Release: release

targets:

  PTPeep:
    type: application
    platform: macOS
    sources:
      - path: PTPeep/App
      - path: PTPeep/Parser
      - path: PTPeep/ProTools
      - path: PTPeep/UI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fozzie.ptpeep
        INFOPLIST_FILE: PTPeep/App/Info.plist
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: minimal
    entitlements:
      path: PTPeep/App/PTPeep.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true

  PTPeepQL:
    type: app-extension
    platform: macOS
    sources:
      - path: PTPeepQL
      - path: PTPeep/Parser
      - path: PTPeep/ProTools
      - path: PTPeep/UI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fozzie.ptpeep.ql
        INFOPLIST_FILE: PTPeepQL/Info.plist
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: minimal
    dependencies:
      - target: PTPeep
        embed: false

schemes:
  PTPeep:
    build:
      targets:
        PTPeep: all
        PTPeepQL: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
