<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>

    <!-- macOS squircle -->
    <clipPath id="icon">
      <rect width="1024" height="1024" rx="230"/>
    </clipPath>

    <!-- Background: near-black, faint cool warmth at centre -->
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#141418"/>
      <stop offset="100%" stop-color="#090909"/>
    </radialGradient>

    <!-- Waveform line: bright at the loud centre, fades at silent edges -->
    <linearGradient id="waveLine" x1="70" y1="0" x2="954" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3EDB68" stop-opacity="0.15"/>
      <stop offset="10%"  stop-color="#3EDB68" stop-opacity="0.75"/>
      <stop offset="30%"  stop-color="#3EDB68" stop-opacity="1.0"/>
      <stop offset="70%"  stop-color="#3EDB68" stop-opacity="1.0"/>
      <stop offset="90%"  stop-color="#3EDB68" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#3EDB68" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Glow gradient: same fade, used on the blurred backing pass -->
    <linearGradient id="waveGlow" x1="70" y1="0" x2="954" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3EDB68" stop-opacity="0.0"/>
      <stop offset="10%"  stop-color="#3EDB68" stop-opacity="0.3"/>
      <stop offset="35%"  stop-color="#3EDB68" stop-opacity="0.55"/>
      <stop offset="65%"  stop-color="#3EDB68" stop-opacity="0.55"/>
      <stop offset="90%"  stop-color="#3EDB68" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3EDB68" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Soft glow: Gaussian blur only — composited as a separate draw pass -->
    <filter id="glow" x="-8%" y="-25%" width="116%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

  </defs>

  <g clip-path="url(#icon)">

    <!-- ── Background ─────────────────────────────────────────────── -->
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!--
      ── Waveform path ──────────────────────────────────────────────
      Single continuous S-curve from left (silence) through a swell
      peaking near centre, then tapering back to silence.

      Points (x, peak_y or trough_y; centre = 512):
        70,512 → 125,490 → 170,534 → 215,462 → 265,565 → 310,412
        → 365,625 → 418,288 → 478,748 → 536,272 → 594,740
        → 650,318 → 705,700 → 756,388 → 802,638 → 846,450
        → 886,575 → 922,492 → 954,512

      Control points: midpoint-x of each consecutive pair, clamped to
      the y of the source point then target point (horizontal tangents
      at every peak/trough → smooth S-curve, no kinks).
    -->

    <!-- Glow pass (thick, blurred, gradient opacity) -->
    <path d="M 70,512
             C 97,512  97,490  125,490
             C 147,490 147,534 170,534
             C 192,534 192,462 215,462
             C 240,462 240,565 265,565
             C 287,565 287,412 310,412
             C 337,412 337,625 365,625
             C 391,625 391,288 418,288
             C 448,288 448,748 478,748
             C 507,748 507,272 536,272
             C 565,272 565,740 594,740
             C 622,740 622,318 650,318
             C 677,318 677,700 705,700
             C 730,700 730,388 756,388
             C 779,388 779,638 802,638
             C 824,638 824,450 846,450
             C 866,450 866,575 886,575
             C 904,575 904,492 922,492
             C 938,492 938,512 954,512"
          fill="none"
          stroke="url(#waveGlow)"
          stroke-width="42"
          stroke-linecap="round"
          stroke-linejoin="round"
          filter="url(#glow)"/>

    <!-- Crisp foreground line -->
    <path d="M 70,512
             C 97,512  97,490  125,490
             C 147,490 147,534 170,534
             C 192,534 192,462 215,462
             C 240,462 240,565 265,565
             C 287,565 287,412 310,412
             C 337,412 337,625 365,625
             C 391,625 391,288 418,288
             C 448,288 448,748 478,748
             C 507,748 507,272 536,272
             C 565,272 565,740 594,740
             C 622,740 622,318 650,318
             C 677,318 677,700 705,700
             C 730,700 730,388 756,388
             C 779,388 779,638 802,638
             C 824,638 824,450 846,450
             C 866,450 866,575 886,575
             C 904,575 904,492 922,492
             C 938,492 938,512 954,512"
          fill="none"
          stroke="url(#waveLine)"
          stroke-width="14"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Subtle rim light -->
    <rect width="1024" height="1024" rx="230"
          fill="none"
          stroke="rgba(255,255,255,0.06)"
          stroke-width="3"/>

  </g>
</svg>
