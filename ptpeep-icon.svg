<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>

    <!-- macOS squircle approximation (rx ≈ 22.4% of width) -->
    <clipPath id="icon">
      <rect width="1024" height="1024" rx="230"/>
    </clipPath>

    <!-- Waveform soft glow: blur layer beneath sharp bars -->
    <filter id="glow" x="-15%" y="-5%" width="130%" height="110%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>

    <!-- Background: near-black with faint green warmth at center -->
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#14221a"/>
      <stop offset="55%"  stop-color="#0d1510"/>
      <stop offset="100%" stop-color="#080b09"/>
    </radialGradient>

    <!-- Slat face: top-highlight shading gives physical depth/angle -->
    <linearGradient id="slat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#28282c"/>
      <stop offset="10%"  stop-color="#1e1e22"/>
      <stop offset="100%" stop-color="#111115"/>
    </linearGradient>

  </defs>

  <g clip-path="url(#icon)">

    <!-- ── Background ───────────────────────────────────────────── -->
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- ── Waveform bars ─────────────────────────────────────────
         24 bars, 24 px wide, 19 px gap = 43 px step, startX = 6
         Center Y = 512
         Half-heights:
           15 45 95 165 260 390 455 460 420 440 395 310
           330 290 255 295 270 220 175 190 130 90 50 15
         Bars 5–9 are tall enough (≥ 383 px) to show through the
         outermost gaps, creating the "peeking" effect.            -->
    <g fill="#3EDB68" filter="url(#glow)">
      <rect x="6"   y="497" width="24" height="30"  rx="4"/>  <!-- amp 15  -->
      <rect x="49"  y="467" width="24" height="90"  rx="4"/>  <!-- amp 45  -->
      <rect x="92"  y="417" width="24" height="190" rx="4"/>  <!-- amp 95  -->
      <rect x="135" y="347" width="24" height="330" rx="4"/>  <!-- amp 165 -->
      <rect x="178" y="252" width="24" height="520" rx="4"/>  <!-- amp 260 -->
      <rect x="221" y="122" width="24" height="780" rx="4"/>  <!-- amp 390 -->
      <rect x="264" y="57"  width="24" height="910" rx="4"/>  <!-- amp 455 -->
      <rect x="307" y="52"  width="24" height="920" rx="4"/>  <!-- amp 460 -->
      <rect x="350" y="92"  width="24" height="840" rx="4"/>  <!-- amp 420 -->
      <rect x="393" y="72"  width="24" height="880" rx="4"/>  <!-- amp 440 -->
      <rect x="436" y="117" width="24" height="790" rx="4"/>  <!-- amp 395 -->
      <rect x="479" y="202" width="24" height="620" rx="4"/>  <!-- amp 310 -->
      <rect x="522" y="182" width="24" height="660" rx="4"/>  <!-- amp 330 -->
      <rect x="565" y="222" width="24" height="580" rx="4"/>  <!-- amp 290 -->
      <rect x="608" y="257" width="24" height="510" rx="4"/>  <!-- amp 255 -->
      <rect x="651" y="217" width="24" height="590" rx="4"/>  <!-- amp 295 -->
      <rect x="694" y="242" width="24" height="540" rx="4"/>  <!-- amp 270 -->
      <rect x="737" y="292" width="24" height="440" rx="4"/>  <!-- amp 220 -->
      <rect x="780" y="337" width="24" height="350" rx="4"/>  <!-- amp 175 -->
      <rect x="823" y="322" width="24" height="380" rx="4"/>  <!-- amp 190 -->
      <rect x="866" y="382" width="24" height="260" rx="4"/>  <!-- amp 130 -->
      <rect x="909" y="422" width="24" height="180" rx="4"/>  <!-- amp 90  -->
      <rect x="952" y="462" width="24" height="100" rx="4"/>  <!-- amp 50  -->
      <rect x="995" y="497" width="24" height="30"  rx="4"/>  <!-- amp 15  -->
    </g>

    <!-- ── Slat panels ───────────────────────────────────────────
         6 slats × 127 px + 1 slat × 129 px + 5 gaps × 52 px = 1024
         Gaps (waveform visible): 127–179, 306–358, 485–537,
                                  664–716, 843–895
         Center gap 485–537 straddles Y=512 exactly.              -->

    <!-- Slat 1: 0 → 127 (top, rounded corner sits here) -->
    <rect x="0" y="0"   width="1024" height="127" fill="url(#slat)"/>
    <rect x="0" y="124" width="1024" height="1"   fill="rgba(255,255,255,0.08)"/>
    <rect x="0" y="125" width="1024" height="2"   fill="rgba(0,0,0,0.55)"/>

    <!-- Slat 2: 179 → 306 -->
    <rect x="0" y="179" width="1024" height="1"   fill="rgba(255,255,255,0.04)"/>
    <rect x="0" y="180" width="1024" height="126" fill="url(#slat)"/>
    <rect x="0" y="303" width="1024" height="1"   fill="rgba(255,255,255,0.08)"/>
    <rect x="0" y="304" width="1024" height="2"   fill="rgba(0,0,0,0.55)"/>

    <!-- Slat 3: 358 → 485 -->
    <rect x="0" y="358" width="1024" height="1"   fill="rgba(255,255,255,0.04)"/>
    <rect x="0" y="359" width="1024" height="126" fill="url(#slat)"/>
    <rect x="0" y="482" width="1024" height="1"   fill="rgba(255,255,255,0.08)"/>
    <rect x="0" y="483" width="1024" height="2"   fill="rgba(0,0,0,0.55)"/>

    <!-- Slat 4: 537 → 664 -->
    <rect x="0" y="537" width="1024" height="1"   fill="rgba(255,255,255,0.04)"/>
    <rect x="0" y="538" width="1024" height="126" fill="url(#slat)"/>
    <rect x="0" y="661" width="1024" height="1"   fill="rgba(255,255,255,0.08)"/>
    <rect x="0" y="662" width="1024" height="2"   fill="rgba(0,0,0,0.55)"/>

    <!-- Slat 5: 716 → 843 -->
    <rect x="0" y="716" width="1024" height="1"   fill="rgba(255,255,255,0.04)"/>
    <rect x="0" y="717" width="1024" height="126" fill="url(#slat)"/>
    <rect x="0" y="840" width="1024" height="1"   fill="rgba(255,255,255,0.08)"/>
    <rect x="0" y="841" width="1024" height="2"   fill="rgba(0,0,0,0.55)"/>

    <!-- Slat 6: 895 → 1024 (bottom, rounded corner sits here) -->
    <rect x="0" y="895" width="1024" height="1"   fill="rgba(255,255,255,0.04)"/>
    <rect x="0" y="896" width="1024" height="128" fill="url(#slat)"/>

    <!-- ── Subtle rim light (top-left light source, classic macOS) -->
    <rect width="1024" height="1024" rx="230"
          fill="none"
          stroke="rgba(255,255,255,0.07)"
          stroke-width="3"/>

  </g>
</svg>
